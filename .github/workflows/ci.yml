name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: marcus-mcp-server/package-lock.json
      - run: npm ci
        working-directory: marcus-mcp-server
      - run: npm run type-check
        working-directory: marcus-mcp-server
      - run: npm test
        working-directory: marcus-mcp-server
