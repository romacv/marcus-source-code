name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: marcus-mcp-server/package-lock.json
      - run: npm ci
        working-directory: marcus-mcp-server
      - run: npm run type-check
        working-directory: marcus-mcp-server
      - run: npm test
        working-directory: marcus-mcp-server

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: marcus-mcp-server/package-lock.json
      - run: npm ci
        working-directory: marcus-mcp-server
      - run: npm run deploy
        working-directory: marcus-mcp-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
